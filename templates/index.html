<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FWI Prediction</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="main-container">

    <div class="card">

        <h1>🔥 FWI Prediction</h1>
        <p class="subtitle">Forest Fire Weather Index Predictor</p>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <div class="input-group">
                <input type="number" name="Temperature" placeholder="Temperature (°C)" required>
            </div>

            <div class="input-group">
                <input type="number" name="RH" placeholder="Relative Humidity" required>
            </div>

            <div class="input-group">
                <input type="number" name="Ws" placeholder="Wind Speed" required>
            </div>

            <div class="input-group">
                <input type="number" name="Rain" placeholder="Rain (mm)" required>
            </div>

            <div class="input-group">
                <input type="number" name="FFMC" placeholder="FFMC" required>
            </div>

            <div class="input-group">
                <input type="number" name="DMC" placeholder="DMC" required>
            </div>

            <div class="input-group">
                <input type="number" name="ISI" placeholder="ISI" required>
            </div>

            <div class="input-group">
                <input type="number" name="Classes" placeholder="Classes" required>
            </div>

            <div class="input-group">
                <input type="number" name="Region" placeholder="Region" required>
            </div>

            <button type="submit" class="btn">
                Predict
            </button>

        </form>

        <div class="result">
            <h2>{{ results }}</h2>
        </div>

    </div>

</div>

</body>
</html>
